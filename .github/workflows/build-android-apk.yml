name: Gerar APK Android - Controle de Fiados

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  android-apk:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependências
        run: npm install

      - name: Preparar pasta www
        run: npm run prepare-www

      - name: Criar projeto Android se não existir
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Gerar APK debug
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Publicar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: CONTROLE-FIADOS-ANDROID-APK
          path: android/app/build/outputs/apk/debug/*.apk
